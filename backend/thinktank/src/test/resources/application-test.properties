server.port=0

spring.datasource.url=jdbc:h2:mem:thinktank_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.flyway.enabled=false
spring.sql.init.mode=never

app.jwt.secret=${JWT_SECRET:CHANGE_ME_IN_TEST_THINKTANK_JWT_SECRET_64_CHARS_MIN}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
