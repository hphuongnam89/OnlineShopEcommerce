# Cấu hình chạy backend; các giá trị nhạy cảm có thể được thay bằng biến môi trường.
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/thinktank?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQL8Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Các migration cũ đã được áp dụng trong database hiện hữu nhưng không còn nằm trong source hiện tại.
spring.flyway.ignore-migration-patterns=*:missing

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.upload.dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.auth.secure-cookie=${AUTH_SECURE_COOKIE:true}
app.orders.pending-timeout-minutes=${PENDING_ORDER_TIMEOUT_MINUTES:30}
app.orders.cleanup-delay-ms=${PENDING_ORDER_CLEANUP_DELAY_MS:900000}
app.admin.bootstrap-email=${ADMIN_BOOTSTRAP_EMAIL}
app.admin.bootstrap-password=${ADMIN_BOOTSTRAP_PASSWORD}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
