server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/thinktank?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_THINKTANK_JWT_SECRET_64_CHARS_MIN}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
